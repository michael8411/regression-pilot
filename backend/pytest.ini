[pytest]
# Run tests from the backend/ package root, regardless of where pytest is invoked.
# `pythonpath = .` puts backend/ on sys.path so tests can do `from utils.x import ...`
# and `from services.x import ...` the same way the running backend does.

testpaths = tests
pythonpath = .

# Mirror the naming conventions we already use.
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Quiet noisy third-party deprecation chatter that we can't fix ourselves.
filterwarnings =
    ignore::DeprecationWarning:google.*
    ignore::DeprecationWarning:pydantic.*

# When async tests are introduced, install pytest-asyncio and add:
#     asyncio_mode = strict
